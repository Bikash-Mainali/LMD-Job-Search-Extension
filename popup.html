<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobSearchHelper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #161921;
      --surface2: #1e2230;
      --border: #2a2f42;
      --accent: #f0c040;
      --accent2: #4ef0b0;
      --accent3: #f05060;
      --text: #e8eaf0;
      --muted: #6b7280;
      --tag-bg: #1e2a18;
      --tag-border: #3a5030;
      --tag-text: #7ee060;
    }

    body {
      width: 340px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 16px;
      height: 16px;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    .status-dot {
      margin-left: auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s ease;
    }

    .status-dot.active {
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
    }

    /* MAIN CONTENT */
    .content {
      padding: 16px 20px;
    }

    /* COUNT BADGE */
    .count-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .keyword-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(240, 192, 64, 0.1);
      border: 1px solid rgba(240, 192, 64, 0.25);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* INPUT AREA */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .keyword-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .keyword-input::placeholder {
      color: var(--muted);
    }

    .keyword-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.1);
    }

    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
      color: #0d0f14;
    }

    .add-btn:hover {
      opacity: 0.85;
      transform: scale(1.05);
    }

    .add-btn:active {
      transform: scale(0.95);
    }

    /* TAGS */
    .tags-container {
      min-height: 90px;
      max-height: 150px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      margin-bottom: 16px;
    }

    .tags-container::-webkit-scrollbar {
      width: 4px;
    }

    .tags-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .tags-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .empty-msg {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 16px 0;
      text-align: center;
    }

    .empty-msg svg {
      opacity: 0.4;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--tag-text);
      border-radius: 6px;
      padding: 4px 8px 4px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      animation: tagIn 0.2s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      line-height: 1;
      transition: color 0.15s;
      font-size: 14px;
    }

    .tag-remove:hover {
      color: var(--accent3);
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 16px;
    }

    /* ACTION BUTTONS */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
      letter-spacing: 0.2px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-save {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-save:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-highlight {
      background: var(--accent);
      color: #0d0f14;
      font-weight: 600;
    }

    .btn-highlight:hover {
      opacity: 0.88;
      box-shadow: 0 4px 16px rgba(240, 192, 64, 0.3);
    }

    .btn-clear {
      grid-column: span 2;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
    }

    .btn-clear:hover {
      border-color: var(--accent3);
      color: var(--accent3);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: var(--accent2); color: var(--accent2); }
    .toast.info { border-color: var(--accent); color: var(--accent); }
    .toast.error { border-color: var(--accent3); color: var(--accent3); }

    /* MATCH COUNT */
    .match-info {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
      transition: color 0.2s;
    }

    .match-info.found {
      color: var(--accent2);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="7" r="4.5" stroke="#0d0f14" stroke-width="1.8"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#0d0f14" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="5" y1="7" x2="9" y2="7" stroke="#0d0f14" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="7" y1="5" x2="7" y2="9" stroke="#0d0f14" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>JobSearchHelper</h1>
      <p>KEYWORD HIGHLIGHTER</p>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="content">
    <div class="count-bar">
      <span class="section-label">Your Keywords</span>
      <span class="keyword-count" id="keywordCount">0 saved</span>
    </div>

    <div class="input-row">
      <input
        class="keyword-input"
        id="keywordInput"
        type="text"
        placeholder="e.g. backend, Python, remote..."
        maxlength="50"
      />
      <button class="add-btn" id="addBtn" title="Add keyword">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="tags-container" id="tagsContainer">
      <div class="empty-msg" id="emptyMsg">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        Add keywords to get started
      </div>
    </div>

    <div class="divider"></div>

    <div class="actions">
      <button class="btn btn-save" id="saveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save Keywords
      </button>
      <button class="btn btn-highlight" id="highlightBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        Highlight
      </button>
      <button class="btn btn-clear" id="clearBtn">
        ✕ Remove highlights from page
      </button>
    </div>

    <div class="match-info" id="matchInfo"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
